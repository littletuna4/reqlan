name: Deploy site to GitHub Pages

# Triggered by site/v* tags (manual or release.yml) per
# reqlan rq/distribution/distribution.rq site_distribution.
# release.yml also invokes this workflow directly because pushes made
# with GITHUB_TOKEN do not trigger other workflows.

on:
  push:
    tags:
      - "site/v*"
  workflow_call:
    inputs:
      site_tag:
        description: Annotated site release tag to deploy
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.site_tag != '' && inputs.site_tag || github.ref }}

      - name: Resolve site version
        run: |
          if [ -n "${{ inputs.site_tag }}" ]; then
            TAG="${{ inputs.site_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/site/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="site/v$(node -p "require('./site/package.json').version")"
          fi
          echo "SITE_VERSION=${TAG#site/v}" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        working-directory: site
        env:
          SITE_BASE_PATH: /reqlan
        run: pnpm run build

      - name: Disable Jekyll processing
        working-directory: site
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
