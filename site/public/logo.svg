<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1095 1095" width="1095" height="1095">
  <!-- OUTER BLUE LINES (With gap adjusted for increased radii) -->
  <g stroke="#0bc9d6" stroke-width="14" stroke-linecap="round">
    <!-- Top circle to Diagonal circles -->
    <line x1="492.1" y1="220.5" x2="355.4" y2="277.0" />
    <line x1="602.9" y1="220.5" x2="739.6" y2="277.0" />
    <!-- Bottom circle to Diagonal circles -->
    <line x1="492.1" y1="874.5" x2="355.4" y2="818.0" />
    <line x1="602.9" y1="874.5" x2="739.6" y2="818.0" />
    <!-- Left circle to Diagonal circles -->
    <line x1="220.5" y1="492.1" x2="277.0" y2="355.4" />
    <line x1="220.5" y1="602.9" x2="277.0" y2="739.6" />
    <!-- Right circle to Diagonal circles -->
    <line x1="874.5" y1="492.1" x2="818.0" y2="355.4" />
    <line x1="874.5" y1="602.9" x2="818.0" y2="739.6" />
  </g>

  <!-- INNER BLUE LINES (With gap adjusted for increased radii) -->
  <g stroke="#0bc9d6" stroke-width="14" stroke-linecap="round">
    <line x1="481.7" y1="481.7" x2="342.4" y2="342.4" />
    <line x1="613.3" y1="481.7" x2="752.6" y2="342.4" />
    <line x1="481.7" y1="613.3" x2="342.4" y2="752.6" />
    <line x1="613.3" y1="613.3" x2="752.6" y2="752.6" />
  </g>

  <!-- BLUE OUTER CIRCLES -->
  <g fill="#0bc9d6">
    <circle cx="300.0" cy="300.0" r="40" />
    <circle cx="795.0" cy="300.0" r="40" />
    <circle cx="300.0" cy="795.0" r="40" />
    <circle cx="795.0" cy="795.0" r="40" />
  </g>

  <!-- RED VERTICAL AND HORIZONTAL LINES (With gap adjusted for increased radii) -->
  <g stroke="#e1430e" stroke-width="14" stroke-linecap="round">
    <!-- Vertical segments -->
    <line x1="547.5" y1="257.5" x2="547.5" y2="454.5" />
    <line x1="547.5" y1="640.5" x2="547.5" y2="837.5" />
    <!-- Horizontal segments -->
    <line x1="257.5" y1="547.5" x2="454.5" y2="547.5" />
    <line x1="640.5" y1="547.5" x2="837.5" y2="547.5" />
  </g>

  <!-- CENTER CIRCLE -->
  <circle cx="547.5" cy="547.5" r="70" fill="#e1430e" />

  <!-- RED OUTER CIRCLES -->
  <g fill="#e1430e">
    <circle cx="547.5" cy="197.5" r="40" />
    <circle cx="547.5" cy="897.5" r="40" />
    <circle cx="197.5" cy="547.5" r="40" />
    <circle cx="897.5" cy="547.5" r="40" />
  </g>
</svg>
