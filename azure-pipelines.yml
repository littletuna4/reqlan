trigger:
  branches:
    include:
      - main
      - extension-distribution
  tags:
    include:
      - refs/tags/v*

pr:
  branches:
    include:
      - main
      - extension-distribution

strategy:
  matrix:
    linux:
      imageName: ubuntu-latest
    mac:
      imageName: macos-latest
    windows:
      imageName: windows-latest

pool:
  vmImage: $(imageName)

steps:
  - checkout: self
    clean: true

  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: Setup Node.js

  - pwsh: |
      corepack enable
      corepack prepare pnpm@11.9.0 --activate
      pnpm --version
    displayName: Setup pnpm

  - pwsh: |
      pnpm install --frozen-lockfile
    displayName: Install dependencies

  - pwsh: |
      pnpm run build
    displayName: Build workspace

  - pwsh: |
      pnpm run test
    displayName: Run tests

  - pwsh: |
      pnpm --filter ./packages/extension run package
    displayName: Package extension
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

  - task: PublishBuildArtifacts@1
    displayName: Publish VSIX artifact
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))
    inputs:
      PathtoPublish: packages/extension
      ArtifactName: reqlan-vsix
      publishLocation: Container

  - pwsh: |
      pnpm --filter ./packages/extension run deploy
    displayName: Publish extension
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'), eq(variables['Agent.OS'], 'Linux'))
    env:
      VSCE_PAT: $(VSCE_PAT)
