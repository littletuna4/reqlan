trigger:
  tags:
    include:
      - refs/tags/ext/v*

variables:
  - group: "reqlan secret tokens"

jobs:
  - job: build_test_package
    displayName: Build, test, package extension
    timeoutInMinutes: 45
    cancelTimeoutInMinutes: 5
    strategy:
      matrix:
        linux:
          imageName: ubuntu-latest
        # mac: # nah, linux will do.
        #   imageName: macos-latest
        # windows:
        #   imageName: windows-latest
    pool:
      vmImage: $(imageName)

    steps:
      - checkout: self
        clean: true
        timeoutInMinutes: 5

      - task: UseNode@1
        inputs:
          version: "24.x"
        displayName: Setup Node.js
        timeoutInMinutes: 10

      - pwsh: |
          $ErrorActionPreference = "Stop"
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
          node --version
          pnpm --version
        displayName: Setup pnpm
        timeoutInMinutes: 10

      - pwsh: |
          $ErrorActionPreference = "Stop"
          pnpm install --frozen-lockfile
        displayName: Install dependencies
        timeoutInMinutes: 15

      - pwsh: |
          $ErrorActionPreference = "Stop"
          pnpm run build
        displayName: Build workspace
        timeoutInMinutes: 20

      - pwsh: |
          $ErrorActionPreference = "Stop"
          pnpm run test
        displayName: Run tests
        timeoutInMinutes: 15

      - pwsh: |
          $ErrorActionPreference = "Stop"
          $tagRef = "$(Build.SourceBranch)"
          if (-not $tagRef.StartsWith("refs/tags/ext/v")) {
            Write-Host "Not a version tag build; skipping extension version alignment."
            exit 0
          }

          $version = $tagRef.Substring("refs/tags/ext/v".Length)
          Write-Host "Aligning packages/extension/package.json version to $version"

          node -e "const fs=require('fs'); const path='packages/extension/package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(path, JSON.stringify(pkg, null, 4) + '\n');" $version
        displayName: Align extension version with tag
        timeoutInMinutes: 5

      - pwsh: |
          $ErrorActionPreference = "Stop"
          pnpm --filter ./packages/extension run package
        displayName: Package extension
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))
        timeoutInMinutes: 15

      - task: PublishBuildArtifacts@1
        displayName: Publish VSIX artifact
        condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))
        timeoutInMinutes: 5
        inputs:
          PathtoPublish: packages/extension
          ArtifactName: reqlan-vsix
          publishLocation: Container

      - task: AzureCLI@2
        displayName: Publish extension
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/ext/v'), eq(variables['Agent.OS'], 'Linux'))
        timeoutInMinutes: 10
        inputs:
          azureSubscription: $(AzureMarketplaceServiceConnection)
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            $ErrorActionPreference = "Stop"
            # AzureCLI@2 logs in via the ARM service connection; vsce obtains the
            # Entra ID access token for the Marketplace resource via --azure-credential.
            pnpm --filter ./packages/extension exec vsce publish --no-dependencies --azure-credential

      - pwsh: |
          $ErrorActionPreference = "Stop"
          pnpm --filter ./packages/extension run deploy:openvsx
        displayName: Publish extension to Open VSX
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/ext/v'), eq(variables['Agent.OS'], 'Linux'))
        timeoutInMinutes: 10
        env:
          OVSX_PAT: $(OpenVSX Token)
